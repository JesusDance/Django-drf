{% extends "main/index.html" %}

{% block content %}
<h2>Sing up Form</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-user">
                {{ field.label_tag }}
                {{ field }}
            {% if field.help_text %}
                <div class="help-text">
                    {{ field.help_text }}
                </div>
            {% endif %}
            {% if field.errors %}
                <div class="form-error">
                    {{ field.errors }}
                </div>
            {% endif %}
            </div>
        {% endfor %}
        <div class="text-center mb-3">
            <button type="submit" class="btn btn-primary fw-bold">Submit form</button>
        </div>
    </form>
{% endblock %}
