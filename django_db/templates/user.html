<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% block content %}
<h2>Sing up Form</h2>
    <form method="POST">
        {% csrf_token %}
        {% for field in form %}
            <div class="form-user">
                {{ field.label_tag }}
                {{ field }}
            {% if field.help_text %}
                <div class="help-text">
                    {{ field.help_text }}
                </div>
                {% endif %}
            {% if field.errors %}
                <div class="form-error">
                    {{ field.errors }}
                </div>
            {% endif %}
            </div>
        {% endfor %}
        <button type="submit">Submit form</button>
    </form>
{% endblock %}
</body>
</html>
